name: GitVerse Pages

on:
  push:
    branches:
      - master
    paths:
      - mkdocs.yml
      - docs/**
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # https://github.com/marketplace/actions/astral-sh-setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # По умолчанию там auto, а я не уверен, что GitVerse поддерживает эту функцию
          # enable-cache: true
          python-version: "3.12"
          version: "0.10.2"
      
      - name: Set up Python
        run: uv python install

      - name: Build site
        run: uv run mkdocs build --verbose --strict --site-dir site/
      
      - name: Sanity check
        run: "[[ -d './site' ]]"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: 'site/'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Go необходим для выполнения deploy-pages
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.23'

      - name: Deploy to GitVerse Pages
        id: deployment
        uses: actions/deploy-pages@v1
        with:
          artifact_name: gitverse-pages

      - name: Print deploy URL
        run: echo "🌐 page_url = ${{ steps.deployment.outputs.page_url }}"
